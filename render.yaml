services:
  - type: web
    name: simogrants
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ASI1_API_KEY
        sync: false
    healthCheckPath: /health
